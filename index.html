    <script type="text/javascript">
      // Attempt to detect asset load failures and report them to PostHog
      (function () {
        const KEY = "mocha:asset_errors";
        const EVENT_NAME = "asset_load_error";

        // Can add LINK and IMG if we want to track those too
        const TAGS = ["SCRIPT"];

        window.__sendPostHogAssetFailures = __sendPostHogAssetFailures;
        window.__posthogCapture = __posthogCapture;

        function __sendPostHogAssetFailures() {
          try {
            const errors = JSON.parse(localStorage.getItem(KEY) || "[]");
            const hasErrors = Array.isArray(errors) && errors.length > 0;

            if (!hasErrors) {
              return;
            }

            errors.forEach((error) => {
              __posthogCapture(EVENT_NAME, error);
            });

            localStorage.removeItem(KEY);
          } catch (err) {
            console.error("Failed to send asset load errors to PostHog:", err);
          }
        }

        function __posthogCapture(eventName, eventProps) {
          if (window.posthog) {
            let userId = null;

            try {
              const reactRoot = document.getElementById("react-root");
              if (reactRoot) {
                const userJson = reactRoot.getAttribute("data-user");
                userId = (userJson ? JSON.parse(userJson) : {}).id || null;
              }
            } catch (_error) {
              // no-op
            }

            posthog.capture(eventName, { userId, ...eventProps });
          }
        }

        window.addEventListener(
          "error",
          function (e) {
            if (e.target !== window && TAGS.includes(e.target.tagName)) {
              const srcUrl = e.target.src || e.target.href;
              const assetError = {
                errorType: e.type,
                errorMessage: e.message,
                src: srcUrl,
                tag: e.target.tagName,
                currentSrc: e.target.currentSrc || null,
                userAgent: navigator.userAgent,
                timestamp: new Date().toISOString(),
              };
              try {
                const errors = JSON.parse(localStorage.getItem(KEY) || "[]");
                errors.push(assetError);
                localStorage.setItem(KEY, JSON.stringify(errors));
                setTimeout(__sendPostHogAssetFailures, 0);
              } catch (err) {
                console.error("Failed to log asset load error:", err);
              }
            }
          },
          true
        );
      })();
    </script>
